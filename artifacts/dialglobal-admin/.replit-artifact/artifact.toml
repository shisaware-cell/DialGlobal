kind = "web"
previewPath = "/admin/"
title = "DialGlobal Admin"
version = "1.0.0"
id = "artifacts/dialglobal-admin"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/admin/" ]
localPort = 25321

[services.development]
run = "pnpm --filter @workspace/dialglobal-admin run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dialglobal-admin", "run", "build" ]
publicDir = "artifacts/dialglobal-admin/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25321"
BASE_PATH = "/admin/"
