kind = "web"
previewPath = "/"
title = "DialGlobal"
version = "1.0.0"
id = "artifacts/dialglobal"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21692

[services.development]
run = "pnpm --filter @workspace/dialglobal run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dialglobal", "run", "build" ]
publicDir = "artifacts/dialglobal/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21692"
BASE_PATH = "/"
